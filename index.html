<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0b0f1e"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="บันทึกรายจ่าย"/>
<title>💰 บันทึกรายจ่าย</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0b0f1e;overscroll-behavior:none}
body{font-family:'Sarabun','Noto Sans Thai',sans-serif;color:#f1f5f9}
#app{max-width:430px;margin:0 auto;min-height:100vh;background:linear-gradient(160deg,#0b0f1e 0%,#1a1040 55%,#0b0f1e 100%);position:relative;padding-bottom:70px}
input{color-scheme:dark;font-family:inherit}
button{font-family:inherit}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(167,139,250,.3);border-radius:2px}

/* NAV */
#nav{display:flex;justify-content:space-around;background:rgba(11,15,30,.97);border-top:1px solid rgba(255,255,255,.07);padding:8px 0 14px;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:50}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:#4b5563;font-size:10px;cursor:pointer;padding:4px 6px;transition:color .2s}
.nav-btn.active{color:#a78bfa}
.nav-icon{font-size:20px}

/* FAB */
#fab{position:fixed;bottom:74px;right:calc(50% - 215px + 18px);width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#38bdf8);border:none;color:#fff;font-size:28px;cursor:pointer;box-shadow:0 4px 24px rgba(167,139,250,.55);z-index:100;display:flex;align-items:center;justify-content:center;transition:transform .15s}
#fab:active{transform:scale(.93)}
@media(max-width:430px){#fab{right:18px}}

/* PAGES */
.page{padding:18px 16px 20px;display:none}
.page.active{display:block}
.page-title{font-size:18px;font-weight:700;margin:0 0 14px}

/* CARD */
.card{background:rgba(255,255,255,.06);border-radius:20px;padding:16px 18px;border:1px solid rgba(255,255,255,.09);backdrop-filter:blur(12px);margin-bottom:14px}

/* INPUTS */
.field-label{font-size:13px;color:#94a3b8;margin-bottom:6px;display:block}
.field-input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:#f1f5f9;font-size:16px;outline:none;margin-bottom:12px;font-family:inherit}
.field-input-lg{font-size:22px;font-weight:700}

/* CAT GRID */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.cat-btn{padding:10px 6px;border-radius:12px;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#94a3b8;font-size:12px;text-align:center;transition:all .15s;font-family:inherit}
.cat-btn.selected{border-width:2px}

/* SAVE BTN */
.save-btn{width:100%;padding:14px;border-radius:14px;cursor:pointer;background:linear-gradient(90deg,#a78bfa,#38bdf8);border:none;color:#fff;font-size:16px;font-weight:700;font-family:inherit;margin-top:4px;transition:opacity .15s}
.save-btn:active{opacity:.85}

/* EXPORT BTN */
.export-btn{flex:1;padding:10px 8px;border-radius:12px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;text-align:center;transition:opacity .15s}
.export-btn:active{opacity:.75}
.export-row{display:flex;gap:8px;margin-bottom:14px}

/* SUMMARY ROW */
.summary-row{display:flex;gap:10px;margin-bottom:14px}
.summary-card{flex:1;background:rgba(255,255,255,.06);border-radius:18px;padding:14px 10px;border:1px solid rgba(255,255,255,.08);text-align:center}
.summary-label{font-size:11px;color:#94a3b8;margin-bottom:5px}
.summary-amount{font-size:18px;font-weight:800}
.summary-count{font-size:11px;color:#475569;margin-top:3px}

/* EXP ITEM */
.exp-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.exp-item:last-child{border-bottom:none}
.cat-dot{width:40px;height:40px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.exp-info{flex:1;min-width:0}
.exp-name{font-size:14px;font-weight:600}
.exp-note{font-size:12px;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exp-right{text-align:right;flex-shrink:0}
.exp-amount{font-size:15px;font-weight:700}
.del-btn{background:none;border:none;color:#4b5563;cursor:pointer;font-size:11px;padding:0;display:block;font-family:inherit}

/* BAR */
.bar-wrap{margin-bottom:10px}
.bar-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.bar-bg{height:8px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.bar-pct{font-size:11px;color:#475569;text-align:right;margin-top:2px}

/* MONTH BAR */
.mbar-wrap{margin-bottom:10px}
.mbar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;align-items:center}
.mbar-bg{height:10px;border-radius:5px;background:rgba(255,255,255,.06);overflow:hidden;position:relative}
.mbar-avg{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,211,61,.5);z-index:2}
.mbar-fill{height:100%;border-radius:5px;transition:width .6s ease}

/* ACCORDION */
.accordion{background:rgba(255,255,255,.06);border-radius:20px;padding:12px 16px;border:1px solid rgba(255,255,255,.09);margin-bottom:10px}
.accordion-head{width:100%;background:none;border:none;color:#f1f5f9;cursor:pointer;padding:0;font-family:inherit;display:flex;justify-content:space-between;align-items:center}
.accordion-body{margin-top:12px;border-top:1px solid rgba(255,255,255,.07);padding-top:12px;display:none}
.accordion-body.open{display:block}

/* TOAST */
#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:rgba(20,14,50,.96);border:1px solid rgba(167,139,250,.45);color:#f1f5f9;padding:10px 22px;border-radius:30px;font-size:14px;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.35);pointer-events:none;opacity:0;transition:opacity .3s}
#toast.show{opacity:1}

/* MODAL */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:200;padding:24px}
#modal.show{display:flex}
.modal-box{background:rgba(20,14,50,.98);border-radius:20px;padding:24px;border:1px solid rgba(255,255,255,.09);max-width:300px;width:100%;text-align:center}

/* GRAD TEXT */
.grad{background:linear-gradient(90deg,#a78bfa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* YEAR SELECTOR */
.year-btns{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.year-btn{padding:8px 18px;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:700;font-size:14px;transition:all .2s;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:#94a3b8}
.year-btn.active{background:linear-gradient(90deg,#a78bfa,#38bdf8);border-color:transparent;color:#fff}

/* DATE GROUP */
.date-group{margin-bottom:16px}
.date-group-header{font-size:13px;color:#94a3b8;font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between}

/* EMPTY */
.empty{text-align:center;padding:36px 20px;color:#4b5563}
.empty-icon{font-size:38px}
.empty-text{margin-top:6px;font-size:13px}

/* INSTALL STEPS */
.step-row{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.step-num{width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.step-text{font-size:13px;color:#cbd5e1;line-height:1.5}
.code-block{background:rgba(0,0,0,.4);border-radius:8px;padding:8px 12px;font-family:monospace;font-size:12px;color:#a78bfa;word-break:break-all;margin-bottom:8px}
</style>
</head>
<body>
<div id="app">

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- CONFIRM MODAL -->
  <div id="modal">
    <div class="modal-box">
      <div style="font-size:36px;margin-bottom:10px">🗑️</div>
      <div style="font-weight:700;font-size:16px;margin-bottom:6px">ลบรายการนี้?</div>
      <div style="font-size:13px;color:#94a3b8;margin-bottom:18px">ไม่สามารถกู้คืนได้</div>
      <div style="display:flex;gap:10px">
        <button class="export-btn" style="background:rgba(148,163,184,.15);border:1px solid rgba(148,163,184,.4);color:#94a3b8" onclick="closeModal()">ยกเลิก</button>
        <button class="export-btn" style="background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.4);color:#FF6B6B" onclick="confirmDelete()">ลบ</button>
      </div>
    </div>
  </div>

  <!-- PAGE: HOME -->
  <div class="page active" id="page-home">
    <div style="text-align:center;margin-bottom:16px">
      <h1 class="grad" style="font-size:22px;font-weight:800;margin-bottom:4px">💰 บันทึกรายจ่าย</h1>
      <div id="today-label" style="font-size:12px;color:#64748b"></div>
      <div style="font-size:11px;color:#6BCB77;margin-top:4px">💾 ข้อมูลบันทึกอัตโนมัติ</div>
    </div>
    <div class="summary-row">
      <div class="summary-card">
        <div class="summary-label">วันนี้</div>
        <div class="summary-amount" id="home-today-amt" style="color:#fb923c">฿0.00</div>
        <div class="summary-count" id="home-today-cnt">0 รายการ</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">เดือนนี้</div>
        <div class="summary-amount" id="home-month-amt" style="color:#a78bfa">฿0.00</div>
        <div class="summary-count" id="home-month-cnt">0 รายการ</div>
      </div>
    </div>
    <div class="card">
      <div class="page-title" style="margin-bottom:10px">รายการวันนี้</div>
      <div id="home-list"></div>
    </div>
    <div id="home-catbars"></div>
  </div>

  <!-- PAGE: ADD -->
  <div class="page" id="page-add">
    <div class="page-title">➕ เพิ่มรายจ่าย</div>
    <label class="field-label">วันที่</label>
    <input type="date" class="field-input" id="add-date"/>
    <label class="field-label">จำนวนเงิน (บาท)</label>
    <input type="number" class="field-input field-input-lg" id="add-amount" placeholder="0.00" inputmode="decimal"/>
    <label class="field-label">หมวดหมู่</label>
    <div class="cat-grid" id="add-catgrid"></div>
    <label class="field-label">หมายเหตุ (ถ้ามี)</label>
    <input type="text" class="field-input" id="add-note" placeholder="เช่น ข้าวกลางวัน, BTS..."/>
    <button class="save-btn" onclick="addExpense()">💾 บันทึกรายจ่าย</button>
  </div>

  <!-- PAGE: DAILY -->
  <div class="page" id="page-daily">
    <div class="page-title">📅 สรุปรายวัน</div>
    <label class="field-label">เลือกวันที่</label>
    <input type="date" class="field-input" id="daily-date" oninput="renderDaily()"/>
    <div class="card" id="daily-summary" style="background:rgba(251,146,60,.1);border:1px solid rgba(251,146,60,.3)">
      <div style="font-size:12px;color:#94a3b8">รวมทั้งวัน</div>
      <div id="daily-total" style="font-size:28px;font-weight:800;color:#fb923c">฿0.00</div>
      <div id="daily-count" style="font-size:12px;color:#64748b">0 รายการ</div>
    </div>
    <div id="daily-export"></div>
    <div id="daily-catbars"></div>
    <div id="daily-list"></div>
  </div>

  <!-- PAGE: MONTHLY -->
  <div class="page" id="page-monthly">
    <div class="page-title">📊 สรุปรายเดือน</div>
    <label class="field-label">เลือกเดือน</label>
    <input type="month" class="field-input" id="monthly-month" oninput="renderMonthly()"/>
    <div class="card" id="monthly-summary" style="background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.3)">
      <div id="monthly-label" style="font-size:12px;color:#94a3b8"></div>
      <div id="monthly-total" style="font-size:28px;font-weight:800;color:#a78bfa">฿0.00</div>
      <div id="monthly-count" style="font-size:12px;color:#64748b">0 รายการ</div>
    </div>
    <div id="monthly-export"></div>
    <div id="monthly-catbars"></div>
    <div id="monthly-list"></div>
  </div>

  <!-- PAGE: YEARLY -->
  <div class="page" id="page-yearly">
    <div class="page-title">🗓️ สรุปรายปี</div>
    <label class="field-label">เลือกปี</label>
    <div class="year-btns" id="year-btns"></div>
    <div class="card" style="background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.3);margin-bottom:14px">
      <div id="yearly-label" style="font-size:12px;color:#94a3b8"></div>
      <div id="yearly-total" style="font-size:30px;font-weight:800;color:#38BDF8">฿0.00</div>
      <div style="display:flex;gap:20px;margin-top:10px">
        <div><div style="font-size:11px;color:#64748b">รายการทั้งหมด</div><div id="yearly-count" style="font-size:15px;font-weight:700">0 รายการ</div></div>
        <div><div style="font-size:11px;color:#64748b">เฉลี่ย/เดือน</div><div id="yearly-avg" style="font-size:15px;font-weight:700;color:#FFD93D">฿0.00</div></div>
        <div><div style="font-size:11px;color:#64748b">เดือนสูงสุด</div><div id="yearly-best" style="font-size:15px;font-weight:700;color:#FF6B6B">-</div></div>
      </div>
    </div>
    <div id="yearly-chart" class="card" style="margin-bottom:14px"></div>
    <div id="yearly-catbars"></div>
    <div id="yearly-accordions"></div>
    <div id="yearly-export"></div>
  </div>

  <!-- FAB -->
  <button id="fab" onclick="goAdd()">+</button>

  <!-- NAV -->
  <nav id="nav">
    <button class="nav-btn active" onclick="goPage('home')" id="nav-home"><span class="nav-icon">🏠</span><span>หน้าแรก</span></button>
    <button class="nav-btn" onclick="goAdd()" id="nav-add"><span class="nav-icon">➕</span><span>เพิ่ม</span></button>
    <button class="nav-btn" onclick="goPage('daily')" id="nav-daily"><span class="nav-icon">📅</span><span>รายวัน</span></button>
    <button class="nav-btn" onclick="goPage('monthly')" id="nav-monthly"><span class="nav-icon">📊</span><span>รายเดือน</span></button>
    <button class="nav-btn" onclick="goPage('yearly')" id="nav-yearly"><span class="nav-icon">🗓️</span><span>รายปี</span></button>
  </nav>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'expense_pwa_v2';
const CATS = [
  {id:'food',          label:'🍜 ค่าอาหาร',        color:'#FF6B6B'},
  {id:'travel',        label:'🚌 ค่าเดินทาง',       color:'#4ECDC4'},
  {id:'home',          label:'🏠 ของใช้ในบ้าน',     color:'#FFD93D'},
  {id:'health',        label:'💊 ค่ารักษาพยาบาล',   color:'#6BCB77'},
  {id:'entertainment', label:'🎬 ความบันเทิง',       color:'#A78BFA'},
  {id:'clothes',       label:'👕 เสื้อผ้า/แฟชั่น',  color:'#F97316'},
  {id:'education',     label:'📚 การศึกษา',          color:'#38BDF8'},
  {id:'other',         label:'📦 อื่นๆ',             color:'#9CA3AF'},
];
const MONTH_SHORT = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const MONTH_FULL  = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

// ── State ─────────────────────────────────────────────────────────────────────
let expenses = [];
let selectedCat = 'food';
let deleteId = null;
let currentYear = String(new Date().getFullYear());
const TODAY = new Date();
const todayStr = fmt(TODAY);
const thisMonthStr = todayStr.slice(0,7);

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(d){ return d.toISOString().split('T')[0]; }
function fmtMoney(n){ return n.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function getCat(id){ return CATS.find(c=>c.id===id)||CATS[7]; }
function sum(arr){ return arr.reduce((s,e)=>s+e.amount,0); }
function catBreakdown(arr){
  const map={};
  arr.forEach(e=>{ map[e.category]=(map[e.category]||0)+e.amount; });
  return Object.entries(map).map(([id,total])=>({...getCat(id),total})).sort((a,b)=>b.total-a.total);
}
function groupByDate(arr){
  const map={};
  arr.forEach(e=>{ (map[e.date]=map[e.date]||[]).push(e); });
  return Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0]));
}
function thYear(y){ return parseInt(y)+543; }

// ── Storage ───────────────────────────────────────────────────────────────────
function save(){
  try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(expenses)); }catch(e){}
}
function load(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw) expenses=JSON.parse(raw);
  }catch(e){ expenses=[]; }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(id){ deleteId=id; document.getElementById('modal').classList.add('show'); }
function closeModal(){ deleteId=null; document.getElementById('modal').classList.remove('show'); }
function confirmDelete(){
  if(!deleteId) return;
  expenses=expenses.filter(e=>e.id!==deleteId);
  save(); closeModal(); showToast('🗑️ ลบรายการแล้ว'); renderAll();
}
document.getElementById('modal').addEventListener('click',function(e){ if(e.target===this) closeModal(); });

// ── Navigation ────────────────────────────────────────────────────────────────
let currentPage='home';
function goPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  document.getElementById('fab').style.display = name==='add'?'none':'flex';
  currentPage=name;
  if(name==='home')    renderHome();
  if(name==='daily')   renderDaily();
  if(name==='monthly') renderMonthly();
  if(name==='yearly')  renderYearly();
}
function goAdd(){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-add').classList.add('active');
  document.getElementById('nav-add').classList.add('active');
  document.getElementById('fab').style.display='none';
  currentPage='add';
}

// ── CSV Export ────────────────────────────────────────────────────────────────
function exportCSV(arr,label){
  const BOM='\uFEFF';
  const header='วันที่,หมวดหมู่,หมายเหตุ,จำนวนเงิน (บาท)\n';
  const rows=arr.map(e=>{
    const cat=getCat(e.category).label.replace(/^[^\s]+ /,'');
    return `${e.date},"${cat}","${e.note||""}",${e.amount.toFixed(2)}`;
  }).join('\n');
  const blob=new Blob([BOM+header+rows],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`รายจ่าย_${label}.csv`; a.click();
  URL.revokeObjectURL(url);
  showToast('📥 ดาวน์โหลด CSV แล้ว!');
}

// ── Build HTML helpers ────────────────────────────────────────────────────────
function buildExpItem(e){
  const cat=getCat(e.category);
  const emoji=cat.label.split(' ')[0];
  const name=cat.label.slice(2);
  const noteHtml=e.note?`<div class="exp-note">${e.note}</div>`:'';
  return `<div class="exp-item">
    <div class="cat-dot" style="background:${cat.color}28;border:1px solid ${cat.color}55">${emoji}</div>
    <div class="exp-info"><div class="exp-name">${name}</div>${noteHtml}</div>
    <div class="exp-right">
      <div class="exp-amount" style="color:${cat.color}">฿${fmtMoney(e.amount)}</div>
      <button class="del-btn" onclick="openModal(${e.id})">ลบ</button>
    </div>
  </div>`;
}

function buildCatBars(arr){
  const total=sum(arr);
  const bd=catBreakdown(arr);
  if(!bd.length) return '';
  let html=`<div class="card"><div style="font-size:15px;font-weight:700;margin-bottom:14px">แยกตามหมวดหมู่</div>`;
  bd.forEach(cat=>{
    const pct=total>0?(cat.total/total)*100:0;
    html+=`<div class="bar-wrap">
      <div class="bar-label"><span>${cat.label}</span><span style="color:${cat.color};font-weight:700">฿${fmtMoney(cat.total)}</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${cat.color}"></div></div>
      <div class="bar-pct">${pct.toFixed(1)}%</div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

function buildGroupedList(grouped){
  if(!grouped.length) return `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">ไม่มีรายการ</div></div>`;
  let html='';
  grouped.forEach(([date,items])=>{
    const d=new Date(date);
    const dLabel=d.toLocaleDateString('th-TH',{weekday:'short',day:'numeric',month:'short'});
    const dTotal=sum(items);
    html+=`<div class="date-group">
      <div class="date-group-header"><span>${dLabel}</span><span style="color:#fb923c">฿${fmtMoney(dTotal)}</span></div>
      ${items.map(e=>buildExpItem(e)).join('')}
    </div>`;
  });
  return html;
}

// ── Render: HOME ──────────────────────────────────────────────────────────────
function renderHome(){
  document.getElementById('today-label').textContent=
    TODAY.toLocaleDateString('th-TH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const todayExp=expenses.filter(e=>e.date===todayStr);
  const monthExp=expenses.filter(e=>e.date.startsWith(thisMonthStr));
  document.getElementById('home-today-amt').textContent='฿'+fmtMoney(sum(todayExp));
  document.getElementById('home-today-cnt').textContent=todayExp.length+' รายการ';
  document.getElementById('home-month-amt').textContent='฿'+fmtMoney(sum(monthExp));
  document.getElementById('home-month-cnt').textContent=monthExp.length+' รายการ';
  const listEl=document.getElementById('home-list');
  listEl.innerHTML=todayExp.length
    ? todayExp.map(e=>buildExpItem(e)).join('')
    : `<div class="empty"><div class="empty-icon">🧾</div><div class="empty-text">ยังไม่มีรายการ<br>กด + เพื่อเพิ่มรายจ่าย</div></div>`;
  document.getElementById('home-catbars').innerHTML=buildCatBars(monthExp);
}

// ── Render: ADD FORM ──────────────────────────────────────────────────────────
function renderAddForm(){
  document.getElementById('add-date').value=todayStr;
  document.getElementById('add-amount').value='';
  document.getElementById('add-note').value='';
  const grid=document.getElementById('add-catgrid');
  grid.innerHTML=CATS.map(cat=>{
    const sel=cat.id===selectedCat;
    return `<button class="cat-btn${sel?' selected':''}"
      style="${sel?`border-color:${cat.color};background:${cat.color}25;color:${cat.color}`:'color:#94a3b8'}"
      onclick="selectCat('${cat.id}')">${cat.label}</button>`;
  }).join('');
}
function selectCat(id){
  selectedCat=id;
  document.querySelectorAll('.cat-btn').forEach((btn,i)=>{
    const cat=CATS[i];
    const sel=cat.id===id;
    btn.className='cat-btn'+(sel?' selected':'');
    btn.style.cssText=sel?`border-color:${cat.color};background:${cat.color}25;color:${cat.color}`:'color:#94a3b8';
    if(!sel) btn.style.border='1px solid rgba(255,255,255,.1)';
  });
}
function addExpense(){
  const amt=Number(document.getElementById('add-amount').value);
  const date=document.getElementById('add-date').value;
  const note=document.getElementById('add-note').value.trim();
  if(!amt||amt<=0){ showToast('⚠️ กรุณากรอกจำนวนเงินที่ถูกต้อง'); return; }
  expenses.unshift({id:Date.now(),amount:amt,category:selectedCat,note,date});
  save(); showToast('✅ บันทึกสำเร็จ!');
  document.getElementById('add-amount').value='';
  document.getElementById('add-note').value='';
  goPage('home');
}

// ── Render: DAILY ─────────────────────────────────────────────────────────────
function renderDaily(){
  const date=document.getElementById('daily-date').value||todayStr;
  const arr=expenses.filter(e=>e.date===date);
  document.getElementById('daily-total').textContent='฿'+fmtMoney(sum(arr));
  document.getElementById('daily-count').textContent=arr.length+' รายการ';
  document.getElementById('daily-export').innerHTML=arr.length
    ? `<div class="export-row"><button class="export-btn" style="background:rgba(107,203,119,.15);border:1px solid rgba(107,203,119,.4);color:#6BCB77" onclick="exportCSV(expenses.filter(e=>e.date==='${date}'),'${date}')">📥 Export CSV</button></div>`:'';
  document.getElementById('daily-catbars').innerHTML=buildCatBars(arr);
  document.getElementById('daily-list').innerHTML=arr.length
    ? arr.map(e=>buildExpItem(e)).join('')
    : `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">ไม่มีรายการในวันนี้</div></div>`;
}

// ── Render: MONTHLY ───────────────────────────────────────────────────────────
function renderMonthly(){
  const ym=document.getElementById('monthly-month').value||thisMonthStr;
  const arr=expenses.filter(e=>e.date.startsWith(ym));
  const mIdx=parseInt(ym.slice(5,7))-1;
  const yr=parseInt(ym.slice(0,4))+543;
  document.getElementById('monthly-label').textContent=MONTH_FULL[mIdx]+' '+yr;
  document.getElementById('monthly-total').textContent='฿'+fmtMoney(sum(arr));
  document.getElementById('monthly-count').textContent=arr.length+' รายการ';
  document.getElementById('monthly-export').innerHTML=arr.length
    ? `<div class="export-row">
        <button class="export-btn" style="background:rgba(107,203,119,.15);border:1px solid rgba(107,203,119,.4);color:#6BCB77" onclick="exportCSV(expenses.filter(e=>e.date.startsWith('${ym}')),'${ym}')">📥 Export เดือนนี้</button>
        <button class="export-btn" style="background:rgba(56,189,248,.15);border:1px solid rgba(56,189,248,.4);color:#38BDF8" onclick="exportCSV(expenses,'ทั้งหมด')">📦 ทั้งหมด</button>
      </div>`:'';
  document.getElementById('monthly-catbars').innerHTML=buildCatBars(arr);
  document.getElementById('monthly-list').innerHTML=buildGroupedList(groupByDate(arr));
}

// ── Render: YEARLY ────────────────────────────────────────────────────────────
function renderYearly(){
  // year buttons
  const ys=[...new Set(expenses.map(e=>e.date.slice(0,4)))].sort((a,b)=>b-a);
  if(!ys.includes(String(TODAY.getFullYear()))) ys.unshift(String(TODAY.getFullYear()));
  document.getElementById('year-btns').innerHTML=ys.map(y=>
    `<button class="year-btn${y===currentYear?' active':''}" onclick="selectYear('${y}')">${thYear(y)}</button>`
  ).join('');

  const yearlyExp=expenses.filter(e=>e.date.startsWith(currentYear));
  const total=sum(yearlyExp);
  const avgM=total/12;

  // monthly breakdown
  const monthly=Array.from({length:12},(_,i)=>{
    const mm=String(i+1).padStart(2,'0');
    const ym=`${currentYear}-${mm}`;
    const arr=yearlyExp.filter(e=>e.date.startsWith(ym));
    return {month:i,ym,arr,total:sum(arr),count:arr.length};
  });
  const maxM=Math.max(...monthly.map(m=>m.total),1);
  const bestMonth=monthly.reduce((a,b)=>b.total>a.total?b:a,monthly[0]);

  document.getElementById('yearly-label').textContent='รวมทั้งปี พ.ศ. '+thYear(currentYear);
  document.getElementById('yearly-total').textContent='฿'+fmtMoney(total);
  document.getElementById('yearly-count').textContent=yearlyExp.length+' รายการ';
  document.getElementById('yearly-avg').textContent='฿'+fmtMoney(avgM);
  document.getElementById('yearly-best').textContent=bestMonth.total>0?MONTH_SHORT[bestMonth.month]:'-';

  // monthly chart
  let chartHtml=`<div style="font-size:15px;font-weight:700;margin-bottom:16px">ค่าใช้จ่ายแต่ละเดือน</div>`;
  monthly.forEach(m=>{
    const pct=(m.total/maxM)*100;
    const isCur=m.ym===thisMonthStr;
    const avgPct=avgM>0?(avgM/maxM)*100:0;
    const barColor=isCur?'linear-gradient(90deg,#a78bfa,#38bdf8)':m.total>avgM&&m.total>0?'#FF6B6B88':'#4ECDC488';
    chartHtml+=`<div class="mbar-wrap">
      <div class="mbar-label">
        <span style="color:${isCur?'#a78bfa':'#94a3b8'};font-weight:${isCur?700:400}">${MONTH_SHORT[m.month]}${isCur?' ◀':''}</span>
        <div>
          <span style="color:${m.total>0?'#f1f5f9':'#334155'};font-weight:600">${m.total>0?'฿'+fmtMoney(m.total):'—'}</span>
          ${m.count>0?`<span style="font-size:10px;color:#475569;margin-left:6px">${m.count} รายการ</span>`:''}
        </div>
      </div>
      <div class="mbar-bg">
        <div class="mbar-avg" style="left:${avgPct}%"></div>
        <div class="mbar-fill" style="width:${pct}%;background:${barColor}"></div>
      </div>
    </div>`;
  });
  chartHtml+=`<div style="font-size:11px;color:#64748b;margin-top:8px">เส้นสีเหลือง = ค่าเฉลี่ย (฿${fmtMoney(avgM)})</div>`;
  document.getElementById('yearly-chart').innerHTML=chartHtml;

  // cat bars
  document.getElementById('yearly-catbars').innerHTML=buildCatBars(yearlyExp);

  // accordions per month
  let accHtml='';
  monthly.filter(m=>m.total>0).forEach(m=>{
    const grouped=groupByDate(m.arr);
    let bodyHtml='';
    grouped.forEach(([date,items])=>{
      const d=new Date(date);
      const dLabel=d.toLocaleDateString('th-TH',{weekday:'short',day:'numeric'});
      bodyHtml+=`<div class="date-group">
        <div class="date-group-header"><span>${dLabel}</span><span style="color:#fb923c">฿${fmtMoney(sum(items))}</span></div>
        ${items.map(e=>buildExpItem(e)).join('')}
      </div>`;
    });
    accHtml+=`<div class="accordion">
      <button class="accordion-head" onclick="toggleAcc(this)">
        <div style="text-align:left">
          <div style="font-size:14px;font-weight:700">${MONTH_FULL[m.month]}</div>
          <div style="font-size:11px;color:#64748b;margin-top:2px">${m.count} รายการ</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:16px;font-weight:800;color:#a78bfa">฿${fmtMoney(m.total)}</div>
          <div style="font-size:12px;color:#475569;margin-top:2px">▼ ดูรายการ</div>
        </div>
      </button>
      <div class="accordion-body">${bodyHtml}</div>
    </div>`;
  });
  document.getElementById('yearly-accordions').innerHTML=accHtml||
    `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">ไม่มีข้อมูลในปีนี้</div></div>`;

  // export
  document.getElementById('yearly-export').innerHTML=yearlyExp.length
    ? `<div class="export-row" style="margin-top:14px"><button class="export-btn" style="background:rgba(56,189,248,.15);border:1px solid rgba(56,189,248,.4);color:#38BDF8" onclick="exportCSV(expenses.filter(e=>e.date.startsWith('${currentYear}')),'${currentYear}')">📥 Export CSV ปีนี้</button></div>`:'';
}

function selectYear(y){
  currentYear=y; renderYearly();
}
function toggleAcc(btn){
  const body=btn.nextElementSibling;
  const open=body.classList.toggle('open');
  btn.querySelector('div:last-child div:last-child').textContent=open?'▲ ซ่อน':'▼ ดูรายการ';
}

// ── Render All ────────────────────────────────────────────────────────────────
function renderAll(){
  if(currentPage==='home')    renderHome();
  if(currentPage==='daily')   renderDaily();
  if(currentPage==='monthly') renderMonthly();
  if(currentPage==='yearly')  renderYearly();
}

// ── Init ──────────────────────────────────────────────────────────────────────
load();
document.getElementById('add-date').value=todayStr;
document.getElementById('daily-date').value=todayStr;
document.getElementById('monthly-month').value=thisMonthStr;
renderAddForm();
renderHome();

// ── Service Worker (PWA offline) ──────────────────────────────────────────────
if('serviceWorker' in navigator){
  const sw=`
    const C='expense-v2';
    self.addEventListener('install',e=>{self.skipWaiting();});
    self.addEventListener('activate',e=>{self.clients.claim();});
    self.addEventListener('fetch',e=>{
      e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));
    });
  `;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
