<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0b0f1e"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="บันทึกรายจ่าย"/>
<title>💰 บันทึกรายจ่าย</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0b0f1e;overscroll-behavior:none}
body{font-family:'Sarabun','Noto Sans Thai',sans-serif;color:#f1f5f9}
#app{max-width:430px;margin:0 auto;min-height:100vh;background:linear-gradient(160deg,#0b0f1e 0%,#1a1040 55%,#0b0f1e 100%);position:relative;padding-bottom:70px}
input{color-scheme:dark;font-family:inherit}
button{font-family:inherit}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(167,139,250,.3);border-radius:2px}

#nav{display:flex;justify-content:space-around;background:rgba(11,15,30,.97);border-top:1px solid rgba(255,255,255,.07);padding:8px 0 14px;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:50}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:#4b5563;font-size:10px;cursor:pointer;padding:4px 6px;transition:color .2s}
.nav-btn.active{color:#a78bfa}
.nav-icon{font-size:20px}

#fab{position:fixed;bottom:74px;right:18px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#38bdf8);border:none;color:#fff;font-size:28px;cursor:pointer;box-shadow:0 4px 24px rgba(167,139,250,.55);z-index:100;display:flex;align-items:center;justify-content:center}
@media(min-width:431px){#fab{right:calc(50% - 215px + 18px)}}

.page{padding:18px 16px 20px;display:none}
.page.active{display:block}
.page-title{font-size:18px;font-weight:700;margin:0 0 14px}

.card{background:rgba(255,255,255,.06);border-radius:20px;padding:16px 18px;border:1px solid rgba(255,255,255,.09);backdrop-filter:blur(12px);margin-bottom:14px}

.field-label{font-size:13px;color:#94a3b8;margin-bottom:6px;display:block}
.field-input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:#f1f5f9;font-size:16px;outline:none;margin-bottom:12px;font-family:inherit}
.field-input-lg{font-size:22px;font-weight:700}

.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.cat-btn{padding:10px 6px;border-radius:12px;cursor:pointer;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#94a3b8;font-size:12px;text-align:center;transition:all .15s}
.cat-btn.sel{border-width:2px}

.save-btn{width:100%;padding:14px;border-radius:14px;cursor:pointer;background:linear-gradient(90deg,#a78bfa,#38bdf8);border:none;color:#fff;font-size:16px;font-weight:700;margin-top:4px}

.exp-btn{flex:1;padding:10px 8px;border-radius:12px;cursor:pointer;font-size:13px;font-weight:600;text-align:center}
.exp-row{display:flex;gap:8px;margin-bottom:14px}

.sum-row{display:flex;gap:10px;margin-bottom:14px}
.sum-card{flex:1;background:rgba(255,255,255,.06);border-radius:18px;padding:14px 10px;border:1px solid rgba(255,255,255,.08);text-align:center}
.sum-lbl{font-size:11px;color:#94a3b8;margin-bottom:5px}
.sum-amt{font-size:18px;font-weight:800}
.sum-cnt{font-size:11px;color:#475569;margin-top:3px}

.exp-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.exp-item:last-child{border-bottom:none}
.cat-dot{width:40px;height:40px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.exp-info{flex:1;min-width:0}
.exp-name{font-size:14px;font-weight:600}
.exp-note{font-size:12px;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exp-right{text-align:right;flex-shrink:0}
.exp-amount{font-size:15px;font-weight:700}
.del-btn{background:none;border:none;color:#ef4444;cursor:pointer;font-size:11px;padding:2px 6px;border-radius:6px;display:block;margin-top:2px;font-family:inherit;background:rgba(239,68,68,.1)}

.bar-wrap{margin-bottom:10px}
.bar-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.bar-bg{height:8px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.bar-pct{font-size:11px;color:#475569;text-align:right;margin-top:2px}

.mbar-wrap{margin-bottom:10px}
.mbar-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;align-items:center}
.mbar-bg{height:10px;border-radius:5px;background:rgba(255,255,255,.06);overflow:hidden;position:relative}
.mbar-avg{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,211,61,.5);z-index:2}
.mbar-fill{height:100%;border-radius:5px;transition:width .6s ease}

.acc{background:rgba(255,255,255,.06);border-radius:20px;padding:12px 16px;border:1px solid rgba(255,255,255,.09);margin-bottom:10px}
.acc-head{width:100%;background:none;border:none;color:#f1f5f9;cursor:pointer;padding:0;display:flex;justify-content:space-between;align-items:center}
.acc-body{margin-top:12px;border-top:1px solid rgba(255,255,255,.07);padding-top:12px;display:none}
.acc-body.open{display:block}

.dg-header{font-size:13px;color:#94a3b8;font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between}
.dg{margin-bottom:16px}

#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:rgba(20,14,50,.96);border:1px solid rgba(167,139,250,.45);color:#f1f5f9;padding:10px 22px;border-radius:30px;font-size:14px;z-index:999;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .3s}
#toast.show{opacity:1}

#modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:200;padding:24px}
#modal.show{display:flex}
.modal-box{background:#13102a;border-radius:20px;padding:24px;border:1px solid rgba(255,255,255,.12);max-width:300px;width:100%;text-align:center}

.grad{background:linear-gradient(90deg,#a78bfa,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.year-btns{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.yr-btn{padding:8px 18px;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:#94a3b8}
.yr-btn.active{background:linear-gradient(90deg,#a78bfa,#38bdf8);border-color:transparent;color:#fff}
.empty{text-align:center;padding:36px 20px;color:#4b5563}

/* Storage status indicator */
#storage-status{font-size:11px;margin-top:4px}

/* Loading overlay */
#loading{position:fixed;inset:0;background:#0b0f1e;display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.spinner{width:36px;height:36px;border:3px solid rgba(167,139,250,.2);border-top-color:#a78bfa;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:14px;color:#94a3b8">กำลังโหลดข้อมูล...</div>
</div>

<div id="app" style="display:none">
  <div id="toast"></div>

  <!-- MODAL -->
  <div id="modal">
    <div class="modal-box">
      <div style="font-size:36px;margin-bottom:10px">🗑️</div>
      <div style="font-weight:700;font-size:16px;margin-bottom:6px">ลบรายการนี้?</div>
      <div style="font-size:13px;color:#94a3b8;margin-bottom:18px">ไม่สามารถกู้คืนได้</div>
      <div style="display:flex;gap:10px">
        <button class="exp-btn" style="background:rgba(148,163,184,.12);border:1px solid rgba(148,163,184,.3);color:#94a3b8" onclick="closeModal()">ยกเลิก</button>
        <button class="exp-btn" style="background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:#ef4444" onclick="doDelete()">ลบ</button>
      </div>
    </div>
  </div>

  <!-- HOME -->
  <div class="page active" id="page-home">
    <div style="text-align:center;margin-bottom:16px">
      <h1 class="grad" style="font-size:22px;font-weight:800;margin-bottom:4px">💰 บันทึกรายจ่าย</h1>
      <div id="today-label" style="font-size:12px;color:#64748b"></div>
      <div id="storage-status"></div>
    </div>
    <div class="sum-row">
      <div class="sum-card"><div class="sum-lbl">วันนี้</div><div class="sum-amt" id="h-today" style="color:#fb923c">฿0.00</div><div class="sum-cnt" id="h-today-c">0 รายการ</div></div>
      <div class="sum-card"><div class="sum-lbl">เดือนนี้</div><div class="sum-amt" id="h-month" style="color:#a78bfa">฿0.00</div><div class="sum-cnt" id="h-month-c">0 รายการ</div></div>
    </div>
    <div class="card"><div class="page-title" style="margin-bottom:10px">รายการวันนี้</div><div id="home-list"></div></div>
    <div id="home-bars"></div>
  </div>

  <!-- ADD -->
  <div class="page" id="page-add">
    <div class="page-title">➕ เพิ่มรายจ่าย</div>
    <label class="field-label">วันที่</label>
    <input type="date" class="field-input" id="add-date"/>
    <label class="field-label">จำนวนเงิน (บาท)</label>
    <input type="number" class="field-input field-input-lg" id="add-amt" placeholder="0.00" inputmode="decimal"/>
    <label class="field-label">หมวดหมู่</label>
    <div class="cat-grid" id="cat-grid"></div>
    <label class="field-label">หมายเหตุ (ถ้ามี)</label>
    <input type="text" class="field-input" id="add-note" placeholder="เช่น ข้าวกลางวัน, BTS..."/>
    <button class="save-btn" onclick="addExpense()">💾 บันทึกรายจ่าย</button>
  </div>

  <!-- DAILY -->
  <div class="page" id="page-daily">
    <div class="page-title">📅 สรุปรายวัน</div>
    <label class="field-label">เลือกวันที่</label>
    <input type="date" class="field-input" id="daily-date" oninput="renderDaily()"/>
    <div class="card" style="background:rgba(251,146,60,.1);border:1px solid rgba(251,146,60,.3)">
      <div style="font-size:12px;color:#94a3b8">รวมทั้งวัน</div>
      <div id="d-total" style="font-size:28px;font-weight:800;color:#fb923c">฿0.00</div>
      <div id="d-count" style="font-size:12px;color:#64748b">0 รายการ</div>
    </div>
    <div id="d-exp"></div><div id="d-bars"></div><div id="d-list"></div>
  </div>

  <!-- MONTHLY -->
  <div class="page" id="page-monthly">
    <div class="page-title">📊 สรุปรายเดือน</div>
    <label class="field-label">เลือกเดือน</label>
    <input type="month" class="field-input" id="mo-month" oninput="renderMonthly()"/>
    <div class="card" style="background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.3)">
      <div id="mo-label" style="font-size:12px;color:#94a3b8"></div>
      <div id="mo-total" style="font-size:28px;font-weight:800;color:#a78bfa">฿0.00</div>
      <div id="mo-count" style="font-size:12px;color:#64748b">0 รายการ</div>
    </div>
    <div id="mo-exp"></div><div id="mo-bars"></div><div id="mo-list"></div>
  </div>

  <!-- YEARLY -->
  <div class="page" id="page-yearly">
    <div class="page-title">🗓️ สรุปรายปี</div>
    <label class="field-label">เลือกปี</label>
    <div class="year-btns" id="yr-btns"></div>
    <div class="card" style="background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.3)">
      <div id="yr-label" style="font-size:12px;color:#94a3b8"></div>
      <div id="yr-total" style="font-size:30px;font-weight:800;color:#38BDF8">฿0.00</div>
      <div style="display:flex;gap:20px;margin-top:10px">
        <div><div style="font-size:11px;color:#64748b">รายการทั้งหมด</div><div id="yr-count" style="font-size:15px;font-weight:700">0</div></div>
        <div><div style="font-size:11px;color:#64748b">เฉลี่ย/เดือน</div><div id="yr-avg" style="font-size:15px;font-weight:700;color:#FFD93D">฿0.00</div></div>
        <div><div style="font-size:11px;color:#64748b">เดือนสูงสุด</div><div id="yr-best" style="font-size:15px;font-weight:700;color:#FF6B6B">-</div></div>
      </div>
    </div>
    <div id="yr-chart" class="card"></div>
    <div id="yr-bars"></div>
    <div id="yr-accs"></div>
    <div id="yr-exp"></div>
  </div>

  <button id="fab" onclick="goAdd()">+</button>

  <nav id="nav">
    <button class="nav-btn active" onclick="goPage('home')" id="nav-home"><span class="nav-icon">🏠</span><span>หน้าแรก</span></button>
    <button class="nav-btn" onclick="goAdd()" id="nav-add"><span class="nav-icon">➕</span><span>เพิ่ม</span></button>
    <button class="nav-btn" onclick="goPage('daily')" id="nav-daily"><span class="nav-icon">📅</span><span>รายวัน</span></button>
    <button class="nav-btn" onclick="goPage('monthly')" id="nav-monthly"><span class="nav-icon">📊</span><span>รายเดือน</span></button>
    <button class="nav-btn" onclick="goPage('yearly')" id="nav-yearly"><span class="nav-icon">🗓️</span><span>รายปี</span></button>
  </nav>
</div>

<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const DB_NAME='ExpenseDB', DB_VER=1, STORE='expenses', LS_KEY='expense_bak';
const CATS=[
  {id:'food',          label:'🍜 ค่าอาหาร',        color:'#FF6B6B'},
  {id:'travel',        label:'🚌 ค่าเดินทาง',       color:'#4ECDC4'},
  {id:'home',          label:'🏠 ของใช้ในบ้าน',     color:'#FFD93D'},
  {id:'health',        label:'💊 ค่ารักษาพยาบาล',   color:'#6BCB77'},
  {id:'entertainment', label:'🎬 ความบันเทิง',       color:'#A78BFA'},
  {id:'clothes',       label:'👕 เสื้อผ้า/แฟชั่น',  color:'#F97316'},
  {id:'education',     label:'📚 การศึกษา',          color:'#38BDF8'},
  {id:'other',         label:'📦 อื่นๆ',             color:'#9CA3AF'},
];
const MS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const MF=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

// ─── STATE ────────────────────────────────────────────────────────────────────
let expenses=[], db=null, storageType='none';
let selCat='food', delId=null, curYear=String(new Date().getFullYear()), curPage='home';
const TODAY=new Date();
const todayStr=fmt(TODAY), thisMonthStr=todayStr.slice(0,7);

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmt(d){return d.toISOString().split('T')[0];}
function money(n){return n.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});}
function getCat(id){return CATS.find(c=>c.id===id)||CATS[7];}
function sum(arr){return arr.reduce((s,e)=>s+e.amount,0);}
function catBD(arr){
  const m={};
  arr.forEach(e=>{m[e.category]=(m[e.category]||0)+e.amount;});
  return Object.entries(m).map(([id,t])=>({...getCat(id),total:t})).sort((a,b)=>b.total-a.total);
}
function grpDate(arr){
  const m={};
  arr.forEach(e=>{(m[e.date]=m[e.date]||[]).push(e);});
  return Object.entries(m).sort((a,b)=>b[0].localeCompare(a[0]));
}
function thY(y){return parseInt(y)+543;}

// ─── INDEXEDDB ────────────────────────────────────────────────────────────────
function openDB(){
  return new Promise((res,rej)=>{
    if(!window.indexedDB){rej('no idb');return;}
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains(STORE))
        d.createObjectStore(STORE,{keyPath:'id'});
    };
    req.onsuccess=e=>{res(e.target.result);};
    req.onerror=()=>rej(req.error);
  });
}
function idbGetAll(){
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readonly');
    const req=tx.objectStore(STORE).getAll();
    req.onsuccess=()=>res(req.result||[]);
    req.onerror=()=>rej(req.error);
  });
}
function idbPut(item){
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readwrite');
    const req=tx.objectStore(STORE).put(item);
    req.onsuccess=()=>res();
    req.onerror=()=>rej(req.error);
  });
}
function idbDelete(id){
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readwrite');
    const req=tx.objectStore(STORE).delete(id);
    req.onsuccess=()=>res();
    req.onerror=()=>rej(req.error);
  });
}

// ─── STORAGE LAYER ────────────────────────────────────────────────────────────
async function saveAll(){
  // Backup to localStorage always
  try{localStorage.setItem(LS_KEY,JSON.stringify(expenses));}catch(e){}
  // Primary: IndexedDB
  if(db){
    // We store each expense individually so we can add/delete efficiently
    // (already done in addExpense/deleteExpense)
  }
}

async function loadAll(){
  // Try IndexedDB first
  if(db){
    try{
      const rows=await idbGetAll();
      if(rows.length>0){
        expenses=rows.sort((a,b)=>b.id-a.id);
        storageType='IndexedDB';
        // sync to localStorage backup
        try{localStorage.setItem(LS_KEY,JSON.stringify(expenses));}catch(e){}
        return;
      }
    }catch(e){}
  }
  // Fallback: localStorage
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(raw){
      expenses=JSON.parse(raw);
      storageType='localStorage';
      // migrate to IndexedDB
      if(db && expenses.length>0){
        for(const e of expenses) await idbPut(e).catch(()=>{});
        storageType='IndexedDB';
      }
      return;
    }
  }catch(e){}
  expenses=[];
  storageType='none';
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastT;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2200);
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(id){delId=id;document.getElementById('modal').classList.add('show');}
function closeModal(){delId=null;document.getElementById('modal').classList.remove('show');}
async function doDelete(){
  if(!delId) return;
  expenses=expenses.filter(e=>e.id!==delId);
  // Delete from IndexedDB
  if(db) await idbDelete(delId).catch(()=>{});
  // Sync localStorage
  try{localStorage.setItem(LS_KEY,JSON.stringify(expenses));}catch(e){}
  closeModal(); toast('🗑️ ลบรายการแล้ว'); renderCur();
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ─── NAV ──────────────────────────────────────────────────────────────────────
function goPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  document.getElementById('fab').style.display=name==='add'?'none':'flex';
  curPage=name;
  renderCur();
}
function goAdd(){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-add').classList.add('active');
  document.getElementById('nav-add').classList.add('active');
  document.getElementById('fab').style.display='none';
  curPage='add';
}
function renderCur(){
  if(curPage==='home')    renderHome();
  if(curPage==='daily')   renderDaily();
  if(curPage==='monthly') renderMonthly();
  if(curPage==='yearly')  renderYearly();
}

// ─── CSV ──────────────────────────────────────────────────────────────────────
function exportCSV(arr,label){
  const BOM='\uFEFF';
  const h='วันที่,หมวดหมู่,หมายเหตุ,จำนวนเงิน (บาท)\n';
  const rows=arr.map(e=>{
    const c=getCat(e.category).label.replace(/^[^\s]+ /,'');
    return `${e.date},"${c}","${e.note||""}",${e.amount.toFixed(2)}`;
  }).join('\n');
  const blob=new Blob([BOM+h+rows],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`รายจ่าย_${label}.csv`; a.click();
  URL.revokeObjectURL(url);
  toast('📥 ดาวน์โหลด CSV แล้ว!');
}

// ─── BUILD HTML ───────────────────────────────────────────────────────────────
function buildItem(e){
  const cat=getCat(e.category);
  const em=cat.label.split(' ')[0], nm=cat.label.slice(2);
  const noteH=e.note?`<div class="exp-note">${e.note}</div>`:'';
  return `<div class="exp-item">
    <div class="cat-dot" style="background:${cat.color}28;border:1px solid ${cat.color}55">${em}</div>
    <div class="exp-info"><div class="exp-name">${nm}</div>${noteH}</div>
    <div class="exp-right">
      <div class="exp-amount" style="color:${cat.color}">฿${money(e.amount)}</div>
      <button class="del-btn" onclick="openModal(${e.id})">🗑️ ลบ</button>
    </div>
  </div>`;
}

function buildBars(arr){
  const total=sum(arr); const bd=catBD(arr);
  if(!bd.length) return '';
  let h=`<div class="card"><div style="font-size:15px;font-weight:700;margin-bottom:14px">แยกตามหมวดหมู่</div>`;
  bd.forEach(c=>{
    const p=total>0?(c.total/total)*100:0;
    h+=`<div class="bar-wrap">
      <div class="bar-row"><span>${c.label}</span><span style="color:${c.color};font-weight:700">฿${money(c.total)}</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${p}%;background:${c.color}"></div></div>
      <div class="bar-pct">${p.toFixed(1)}%</div>
    </div>`;
  });
  return h+`</div>`;
}

function buildGrouped(grouped){
  if(!grouped.length) return `<div class="empty"><div style="font-size:38px">📭</div><div style="margin-top:6px;font-size:13px">ไม่มีรายการ</div></div>`;
  return grouped.map(([date,items])=>{
    const d=new Date(date);
    const lbl=d.toLocaleDateString('th-TH',{weekday:'short',day:'numeric',month:'short'});
    return `<div class="dg">
      <div class="dg-header"><span>${lbl}</span><span style="color:#fb923c">฿${money(sum(items))}</span></div>
      ${items.map(e=>buildItem(e)).join('')}
    </div>`;
  }).join('');
}

function buildExpBtn(color,text,onclick){
  return `<button class="exp-btn" style="background:${color}18;border:1px solid ${color}44;color:${color}" onclick="${onclick}">${text}</button>`;
}

// ─── RENDER HOME ──────────────────────────────────────────────────────────────
function renderHome(){
  document.getElementById('today-label').textContent=
    TODAY.toLocaleDateString('th-TH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const st=document.getElementById('storage-status');
  if(storageType==='IndexedDB') st.innerHTML='<span style="color:#6BCB77;font-size:11px">💾 บันทึกถาวร (IndexedDB)</span>';
  else if(storageType==='localStorage') st.innerHTML='<span style="color:#FFD93D;font-size:11px">💾 บันทึกถาวร (localStorage)</span>';
  else st.innerHTML='<span style="color:#FF6B6B;font-size:11px">⚠️ ไม่สามารถบันทึกถาวรได้</span>';

  const tE=expenses.filter(e=>e.date===todayStr);
  const mE=expenses.filter(e=>e.date.startsWith(thisMonthStr));
  document.getElementById('h-today').textContent='฿'+money(sum(tE));
  document.getElementById('h-today-c').textContent=tE.length+' รายการ';
  document.getElementById('h-month').textContent='฿'+money(sum(mE));
  document.getElementById('h-month-c').textContent=mE.length+' รายการ';
  document.getElementById('home-list').innerHTML=tE.length
    ? tE.map(e=>buildItem(e)).join('')
    : `<div class="empty"><div style="font-size:38px">🧾</div><div style="margin-top:6px;font-size:13px">ยังไม่มีรายการ<br>กด + เพื่อเพิ่มรายจ่าย</div></div>`;
  document.getElementById('home-bars').innerHTML=buildBars(mE);
}

// ─── RENDER ADD ───────────────────────────────────────────────────────────────
function buildCatGrid(){
  document.getElementById('cat-grid').innerHTML=CATS.map(c=>{
    const s=c.id===selCat;
    return `<button class="cat-btn${s?' sel':''}"
      style="${s?`border-color:${c.color};border-width:2px;background:${c.color}25;color:${c.color}`:'color:#94a3b8'}"
      onclick="selCatFn('${c.id}')">${c.label}</button>`;
  }).join('');
}
function selCatFn(id){
  selCat=id;
  document.querySelectorAll('.cat-btn').forEach((btn,i)=>{
    const c=CATS[i]; const s=c.id===id;
    btn.className='cat-btn'+(s?' sel':'');
    btn.style.cssText=s?`border-color:${c.color};border-width:2px;background:${c.color}25;color:${c.color}`:'color:#94a3b8;border:1px solid rgba(255,255,255,.1)';
  });
}
async function addExpense(){
  const amt=Number(document.getElementById('add-amt').value);
  const date=document.getElementById('add-date').value||todayStr;
  const note=document.getElementById('add-note').value.trim();
  if(!amt||amt<=0){toast('⚠️ กรุณากรอกจำนวนเงินที่ถูกต้อง');return;}
  const item={id:Date.now(),amount:amt,category:selCat,note,date};
  expenses.unshift(item);
  // Save to IndexedDB
  if(db){await idbPut(item).catch(()=>{});}
  // Backup localStorage
  try{localStorage.setItem(LS_KEY,JSON.stringify(expenses));}catch(e){}
  document.getElementById('add-amt').value='';
  document.getElementById('add-note').value='';
  toast('✅ บันทึกสำเร็จ!');
  goPage('home');
}

// ─── RENDER DAILY ─────────────────────────────────────────────────────────────
function renderDaily(){
  const date=document.getElementById('daily-date').value||todayStr;
  const arr=expenses.filter(e=>e.date===date);
  document.getElementById('d-total').textContent='฿'+money(sum(arr));
  document.getElementById('d-count').textContent=arr.length+' รายการ';
  document.getElementById('d-exp').innerHTML=arr.length
    ? `<div class="exp-row">${buildExpBtn('#6BCB77','📥 Export CSV',`exportCSV(expenses.filter(e=>e.date==='${date}'),'${date}')`)}</div>`:'' ;
  document.getElementById('d-bars').innerHTML=buildBars(arr);
  document.getElementById('d-list').innerHTML=arr.length
    ? arr.map(e=>buildItem(e)).join('')
    : `<div class="empty"><div style="font-size:38px">📭</div><div style="margin-top:6px">ไม่มีรายการในวันนี้</div></div>`;
}

// ─── RENDER MONTHLY ───────────────────────────────────────────────────────────
function renderMonthly(){
  const ym=document.getElementById('mo-month').value||thisMonthStr;
  const arr=expenses.filter(e=>e.date.startsWith(ym));
  const mi=parseInt(ym.slice(5,7))-1, yr=parseInt(ym.slice(0,4))+543;
  document.getElementById('mo-label').textContent=MF[mi]+' '+yr;
  document.getElementById('mo-total').textContent='฿'+money(sum(arr));
  document.getElementById('mo-count').textContent=arr.length+' รายการ';
  document.getElementById('mo-exp').innerHTML=arr.length
    ? `<div class="exp-row">
        ${buildExpBtn('#6BCB77','📥 Export เดือนนี้',`exportCSV(expenses.filter(e=>e.date.startsWith('${ym}')),'${ym}')`)}
        ${buildExpBtn('#38BDF8','📦 ทั้งหมด',"exportCSV(expenses,'ทั้งหมด')")}
      </div>`:'';
  document.getElementById('mo-bars').innerHTML=buildBars(arr);
  document.getElementById('mo-list').innerHTML=buildGrouped(grpDate(arr));
}

// ─── RENDER YEARLY ────────────────────────────────────────────────────────────
function renderYearly(){
  const ys=[...new Set(expenses.map(e=>e.date.slice(0,4)))].sort((a,b)=>b-a);
  if(!ys.includes(String(TODAY.getFullYear()))) ys.unshift(String(TODAY.getFullYear()));
  document.getElementById('yr-btns').innerHTML=ys.map(y=>
    `<button class="yr-btn${y===curYear?' active':''}" onclick="selYear('${y}')">${thY(y)}</button>`
  ).join('');

  const yE=expenses.filter(e=>e.date.startsWith(curYear));
  const total=sum(yE), avgM=total/12;
  const monthly=Array.from({length:12},(_,i)=>{
    const mm=String(i+1).padStart(2,'0'), ym=`${curYear}-${mm}`;
    const arr=yE.filter(e=>e.date.startsWith(ym));
    return {month:i,ym,arr,total:sum(arr),count:arr.length};
  });
  const maxM=Math.max(...monthly.map(m=>m.total),1);
  const best=monthly.reduce((a,b)=>b.total>a.total?b:a,monthly[0]);

  document.getElementById('yr-label').textContent='รวมทั้งปี พ.ศ. '+thY(curYear);
  document.getElementById('yr-total').textContent='฿'+money(total);
  document.getElementById('yr-count').textContent=yE.length+' รายการ';
  document.getElementById('yr-avg').textContent='฿'+money(avgM);
  document.getElementById('yr-best').textContent=best.total>0?MS[best.month]:'-';

  // chart
  let ch=`<div style="font-size:15px;font-weight:700;margin-bottom:16px">ค่าใช้จ่ายแต่ละเดือน</div>`;
  monthly.forEach(m=>{
    const p=(m.total/maxM)*100, ap=avgM>0?(avgM/maxM)*100:0;
    const isCur=m.ym===thisMonthStr;
    const bc=isCur?'linear-gradient(90deg,#a78bfa,#38bdf8)':m.total>avgM&&m.total>0?'#FF6B6B88':'#4ECDC488';
    ch+=`<div class="mbar-wrap">
      <div class="mbar-row">
        <span style="color:${isCur?'#a78bfa':'#94a3b8'};font-weight:${isCur?700:400}">${MS[m.month]}${isCur?' ◀':''}</span>
        <div>
          <span style="color:${m.total>0?'#f1f5f9':'#334155'};font-weight:600">${m.total>0?'฿'+money(m.total):'—'}</span>
          ${m.count>0?`<span style="font-size:10px;color:#475569;margin-left:6px">${m.count} รายการ</span>`:''}
        </div>
      </div>
      <div class="mbar-bg">
        <div class="mbar-avg" style="left:${ap}%"></div>
        <div class="mbar-fill" style="width:${p}%;background:${bc}"></div>
      </div>
    </div>`;
  });
  ch+=`<div style="font-size:11px;color:#64748b;margin-top:8px">เส้นสีเหลือง = ค่าเฉลี่ย (฿${money(avgM)})</div>`;
  document.getElementById('yr-chart').innerHTML=ch;
  document.getElementById('yr-bars').innerHTML=buildBars(yE);

  // accordions
  let ac='';
  monthly.filter(m=>m.total>0).forEach(m=>{
    let bdy='';
    grpDate(m.arr).forEach(([date,items])=>{
      const lbl=new Date(date).toLocaleDateString('th-TH',{weekday:'short',day:'numeric'});
      bdy+=`<div class="dg"><div class="dg-header"><span>${lbl}</span><span style="color:#fb923c">฿${money(sum(items))}</span></div>${items.map(e=>buildItem(e)).join('')}</div>`;
    });
    ac+=`<div class="acc">
      <button class="acc-head" onclick="togAcc(this)">
        <div style="text-align:left"><div style="font-size:14px;font-weight:700">${MF[m.month]}</div><div style="font-size:11px;color:#64748b;margin-top:2px">${m.count} รายการ</div></div>
        <div style="text-align:right"><div style="font-size:16px;font-weight:800;color:#a78bfa">฿${money(m.total)}</div><div style="font-size:12px;color:#475569;margin-top:2px">▼ ดูรายการ</div></div>
      </button>
      <div class="acc-body">${bdy}</div>
    </div>`;
  });
  document.getElementById('yr-accs').innerHTML=ac||`<div class="empty"><div style="font-size:38px">📭</div><div style="margin-top:6px">ไม่มีข้อมูลในปีนี้</div></div>`;
  document.getElementById('yr-exp').innerHTML=yE.length
    ? `<div class="exp-row" style="margin-top:14px">${buildExpBtn('#38BDF8','📥 Export CSV ปีนี้',`exportCSV(expenses.filter(e=>e.date.startsWith('${curYear}')),'${curYear}')`)}</div>`:'' ;
}

function selYear(y){curYear=y;renderYearly();}
function togAcc(btn){
  const b=btn.nextElementSibling, open=b.classList.toggle('open');
  btn.querySelector('div:last-child div:last-child').textContent=open?'▲ ซ่อน':'▼ ดูรายการ';
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init(){
  // Open IndexedDB
  try{ db=await openDB(); }catch(e){ db=null; }

  // Load all expenses
  await loadAll();

  // Hide loading, show app
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';

  // Init form defaults
  document.getElementById('add-date').value=todayStr;
  document.getElementById('daily-date').value=todayStr;
  document.getElementById('mo-month').value=thisMonthStr;
  buildCatGrid();
  renderHome();
}

init();

// ─── SERVICE WORKER ───────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  const sw=`self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>new Response('')));});`;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
